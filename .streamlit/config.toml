# Defaults for any Streamlit app cloned from this template.
# Copying these into the repo means a fresh `streamlit run app.py` works
# without prompting for an email or printing setup nags: both locally
# and in the Docker image.

[browser]
# Disable the first-run email prompt and the anonymous usage beacon.
gatherUsageStats = false

[server]
# Suppress the "Network URL: ..." footer and the email prompt.
# headless = true is also what the Dockerfile sets at runtime; redundant
# but explicit, and makes local-dev behavior match production.
headless = true
